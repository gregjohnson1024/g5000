name: Deploy to Pi

on:
  push:
    branches:
      - main
  workflow_dispatch: # manual trigger from the Actions tab

# Only one deploy at a time. Newer pushes wait for older ones to
# finish; we don't cancel mid-flight (a half-built dist on the Pi
# is worse than waiting an extra minute).
concurrency:
  group: deploy-pi
  cancel-in-progress: false

jobs:
  deploy:
    name: pull + rebuild + restart
    # The self-hosted runner lives on the Pi itself (registered as a
    # systemd service). The runner polls GitHub for jobs; no inbound
    # connection to the Pi is needed. See docs/ops/deploy-runner.md
    # for the registration steps if the runner needs to be re-installed.
    runs-on: [self-hosted, sula-pi]

    # Path on the Pi where the production checkout lives. The runner
    # workspace defaults to a per-job dir under _work/, but we want
    # to run against the real autopilot checkout that the systemd
    # service points at, so we cd in explicitly.
    env:
      AUTOPILOT_DIR: /home/greg/autopilot

    steps:
      - name: Show what we're deploying
        # The commit message is untrusted text — pass it via env, never
        # inline into the shell. Inlining `${{ ...head_commit.message }}`
        # lets backticks / $(...) in a message run as commands (a message
        # containing `tsc -b` once broke this deploy with exit 127).
        # github.event_name and github.sha are controlled values — safe inline.
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          echo "Commit:       ${{ github.sha }}"
          echo "Message:      $COMMIT_MSG"

      - name: Pull main
        working-directory: ${{ env.AUTOPILOT_DIR }}
        run: |
          git fetch origin main
          git pull --ff-only origin main
          git log -1 --oneline

      - name: Install deps if package-lock changed
        working-directory: ${{ env.AUTOPILOT_DIR }}
        run: |
          # `npm ci` is the right thing here but ~3-4× slower than
          # incremental `npm install` and we don't ship to other
          # machines from this clone. Use install + lockfile check.
          if git diff --quiet HEAD@{1} HEAD -- package-lock.json; then
            echo "package-lock unchanged — skipping install"
          else
            echo "package-lock changed — running npm install"
            npm install
          fi

      - name: Build composite refs
        working-directory: ${{ env.AUTOPILOT_DIR }}
        run: |
          # CLAUDE.md §Deployment lists this exact order. Don't reorder
          # without reading the "stale-dist gotcha" callout there.
          npx tsc -b packages/core packages/db packages/grib packages/compute packages/bridge packages/routing packages/coastline

      - name: Build g5000 app
        working-directory: ${{ env.AUTOPILOT_DIR }}/apps/g5000
        run: npm run build

      - name: Build web (next build)
        working-directory: ${{ env.AUTOPILOT_DIR }}/packages/web
        run: npm run build

      # --- The next three steps take the service down briefly. They only
      # do real work on the first deploy after the apps/autopilot-server →
      # apps/g5000 rename; afterwards they all no-op. Builds above ran while
      # the old service was still up, so downtime is just stop → start. ---

      - name: Stop service before data migration
        run: sudo systemctl stop g5000-autopilot

      - name: Migrate data dir from old app path (one-time, idempotent)
        working-directory: ${{ env.AUTOPILOT_DIR }}
        run: |
          # config.db + session logs are CWD-relative (./data). The rename
          # changed the app's CWD, so the existing config (polars, cals,
          # alarms, settings, race state) must move with it or the app boots
          # a fresh empty db. Only moves if old exists and new doesn't, so
          # it runs exactly once. Service is stopped above → SQLite WAL files
          # are not held open during the move.
          if [ -d apps/autopilot-server/data ] && [ ! -d apps/g5000/data ]; then
            echo "migrating data/ from apps/autopilot-server → apps/g5000"
            mv apps/autopilot-server/data apps/g5000/data
            # Clear the now-stale orphan dist/node_modules left behind by the
            # rename so the old path can't be mistaken for a live checkout.
            rm -rf apps/autopilot-server
          else
            echo "no data migration needed"
          fi

      - name: Sync systemd unit if changed
        working-directory: ${{ env.AUTOPILOT_DIR }}
        run: |
          # The unit file's WorkingDirectory moved to apps/g5000. Reinstall
          # when the tracked unit differs from the installed one. The override
          # drop-in (.../g5000-autopilot.service.d/override.conf, YDWG host)
          # is a separate file and is preserved across this copy.
          if ! cmp -s scripts/g5000-autopilot.service /etc/systemd/system/g5000-autopilot.service; then
            echo "unit file changed — reinstalling + daemon-reload"
            sudo cp scripts/g5000-autopilot.service /etc/systemd/system/g5000-autopilot.service
            sudo systemctl daemon-reload
          else
            echo "unit file unchanged"
          fi

      - name: Start service
        run: sudo systemctl start g5000-autopilot

      - name: Verify service is active
        run: |
          sleep 4
          systemctl is-active --quiet g5000-autopilot
          echo "service active"
          # Surface the last few startup log lines so failed boots
          # show up in the GitHub Actions log rather than only in
          # journalctl on the Pi.
          journalctl -u g5000-autopilot --since "30 seconds ago" --no-pager | tail -15
